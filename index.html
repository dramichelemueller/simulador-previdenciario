<head>
<meta charset="UTF-8">

<title>Michele Mueller — Simulador Previdenciário</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1c1a17;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.container{width:100%;max-width:400px;padding:24px;}
.logo-box{text-align:center;margin-bottom:32px;}
.logo-box img{width:120px;height:120px;border-radius:12px;margin-bottom:16px;}
.logo-box h1{color:#fff;font-size:20px;font-weight:600;letter-spacing:.5px;}
.logo-box p{color:#9c9890;font-size:12px;margin-top:4px;letter-spacing:.8px;text-transform:uppercase;}
.card{background:#fff;border-radius:14px;padding:32px;}
.card h2{font-size:16px;font-weight:600;color:#1c1a17;margin-bottom:6px;}
.card p{font-size:13px;color:#9c9890;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:#5c5852;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.field input{width:100%;border:1.5px solid #e8e4dc;border-radius:8px;padding:10px 13px;font-size:14px;font-family:inherit;color:#1c1a17;background:#f5f3ef;transition:border .15s;}
.field input:focus{outline:none;border-color:#2a5282;background:#fff;}
.btn{width:100%;background:#1a3a5c;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px;}
.btn:hover{background:#2a5282;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.erro{background:#fdf0f0;border:1px solid #e0a0a0;border-radius:8px;padding:10px 13px;font-size:12.5px;color:#7a1a1a;margin-bottom:16px;display:none;}
.versao{text-align:center;margin-top:20px;font-size:11px;color:#5c5852;}
</style>
</head>

async function entrar() {
  const email = document.getElementById('email').value.trim();
