<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Previdenciário — Michele Mueller</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#f5f3ef; --card:#fff; --ink:#1c1a17; --ink2:#5c5852; --ink3:#9c9890; --rule:#e8e4dc;
  --accent:#1a3a5c; --accent2:#2a5282; --accent-lt:#e8eef5;
  --clr-emp:#2c4a3e; --bg-emp:#edf5f0; --br-emp:#80b89a;
  --clr-ci20:#1a4a6a; --bg-ci20:#edf2f8; --br-ci20:#80a8cc;
  --clr-ci11:#7a5010; --bg-ci11:#fdf6e8; --br-ci11:#e0c080;
  --clr-fac20:#3a2a6a; --bg-fac20:#f0edf8; --br-fac20:#a890d8;
  --clr-fac11:#6a3a20; --bg-fac11:#faf0e8; --br-fac11:#d0a888;
  --clr-fac5:#8a3a3a; --bg-fac5:#fdf0f0; --br-fac5:#d8a0a0;
  --clr-mei:#9a2a2a; --bg-mei:#fdf0f0; --br-mei:#e0a0a0;
  --clr-esp:#6a1a7a; --bg-esp:#f7edfb; --br-esp:#c8a0e0;
  --clr-rur:#3a5a1a; --bg-rur:#f0f7e8; --br-rur:#9aba70;
  --clr-aux:#1a4a7a; --bg-aux:#edf2fd; --br-aux:#90aae0;
  --ok-bg:#edf8f0; --ok-br:#80c8a0; --ok-tx:#1a5a3a;
  --warn-bg:#fffbe6; --warn-br:#ddc000; --warn-tx:#5a4a00;
  --danger-bg:#fdf0f0; --danger-br:#e0a0a0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--accent);color:#fff;padding:26px 48px 22px;}
.hd-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;}
header h1{font-family:'Playfair Display',serif;font-size:23px;font-weight:600;line-height:1.2;}
header h1 em{font-style:italic;opacity:.55;font-weight:400;}
.hd-sub{font-size:10px;opacity:.42;margin-top:5px;letter-spacing:.7px;text-transform:uppercase;}
.hd-btns{display:flex;gap:8px;flex-wrap:wrap;}
.btn-hd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:7px;padding:7px 15px;font-size:12px;font-family:'Source Sans 3',sans-serif;cursor:pointer;transition:background .15s;}
.btn-hd:hover{background:rgba(255,255,255,.2);}
.btn-hd.destaque{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5);font-weight:600;}

/* ── META BAR ── */
.meta-bar{background:var(--accent2);padding:11px 48px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.meta-field{display:flex;flex-direction:column;gap:3px;}
.meta-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);}
.meta-in{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:5px 9px;color:#fff;font-family:'Source Sans 3',sans-serif;font-size:13px;}
.meta-in::placeholder{color:rgba(255,255,255,.3);}
.meta-in:focus{outline:none;background:rgba(255,255,255,.18);}
select.meta-in option{color:#000;background:#fff;}

/* ── MAIN ── */
.main{max-width:1040px;margin:0 auto;padding:22px 22px 170px;}

/* ── TIPOS ── */
.tipos-section{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:15px 17px;margin-bottom:14px;}
.tipos-section-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);margin-bottom:10px;}
.tipo-grupo{margin-bottom:12px;}
.tipo-grupo:last-child{margin-bottom:0;}
.tipo-grupo-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:6px;padding-left:2px;}
.tipo-grupo-btns{display:flex;gap:7px;flex-wrap:wrap;}
.tipo-btn{border:2px solid var(--rule);border-radius:8px;padding:9px 12px 7px;cursor:pointer;background:var(--bg);text-align:left;font-family:'Source Sans 3',sans-serif;transition:all .13s;min-width:130px;}
.tipo-btn:hover{border-color:var(--accent2);background:var(--card);}
.tipo-btn.active{border-color:var(--tb,var(--accent));background:var(--card);box-shadow:0 0 0 3px rgba(26,58,92,0.22);}
.tb-icon{font-size:14px;margin-bottom:3px;}
.tb-label{font-size:11px;font-weight:700;color:var(--tc,var(--ink));line-height:1.3;}
.tb-sub{font-size:9px;color:var(--ink3);margin-top:1px;line-height:1.4;}
.sub-opts{margin-top:10px;padding:11px 13px;background:var(--bg);border-radius:8px;border:1px solid var(--rule);}
.sub-opts-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:7px;}
.sub-opts-row{display:flex;gap:7px;flex-wrap:wrap;}
.sub-btn{border:1.5px solid var(--rule);border-radius:7px;padding:7px 14px;cursor:pointer;background:var(--card);font-family:'Source Sans 3',sans-serif;font-size:11px;font-weight:600;color:var(--ink2);transition:all .12s;}
.sub-btn:hover{border-color:var(--accent2);}
.sub-btn.active{border-color:var(--tb,var(--accent));background:var(--card);color:var(--tc,var(--accent));box-shadow:0 0 0 2px rgba(26,58,92,0.2);}
.complementacao-toggle{margin-top:10px;padding:10px 13px;background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:8px;display:none;}
.compl-title{font-size:10px;font-weight:700;color:var(--warn-tx);margin-bottom:7px;}
.compl-opts{display:flex;gap:8px;}
.compl-btn{border:1.5px solid var(--warn-br);border-radius:6px;padding:6px 14px;cursor:pointer;background:#fff;font-family:'Source Sans 3',sans-serif;font-size:11.5px;font-weight:600;color:var(--warn-tx);transition:all .12s;}
.compl-btn.active{background:var(--warn-tx);color:#fff;border-color:var(--warn-tx);}
.compl-info{font-size:10.5px;color:var(--warn-tx);margin-top:7px;line-height:1.5;}
.periodo-form{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:15px 17px;margin-bottom:14px;}
.pf-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:11px;}
.pf-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;}
.pf-field{display:flex;flex-direction:column;gap:4px;}
.pf-lbl{font-size:10.5px;font-weight:500;color:var(--ink3);}
.pf-in{border:1.5px solid var(--rule);border-radius:7px;padding:7px 10px;font-size:13px;font-family:'Source Sans 3',sans-serif;color:var(--ink);background:var(--bg);}
.pf-in:focus{outline:none;border-color:var(--accent2);background:#fff;}
.btn-add{padding:8px 22px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;white-space:nowrap;transition:background .12s;}
.btn-add:hover{background:var(--accent2);}
.pf-alerta{background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:7px;padding:8px 12px;font-size:11px;color:var(--warn-tx);margin-top:8px;line-height:1.5;display:none;}
.pf-preview{margin-top:7px;font-size:11.5px;color:var(--ink3);}
.section-title-row{display:flex;align-items:center;justify-content:space-between;margin:18px 0 9px;}
.section-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;}
.periodos-lista{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.periodo-item{background:var(--card);border:1px solid var(--rule);border-radius:9px;padding:13px 15px;display:flex;align-items:center;gap:12px;}
.pi-stripe{width:5px;height:44px;border-radius:3px;flex-shrink:0;}
.pi-info{flex:1;min-width:0;}
.pi-tipo{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.pi-datas{font-size:13.5px;color:var(--ink2);margin-top:3px;}
.pi-nota{font-size:12px;color:var(--ink3);margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px;}
.pi-badges{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;}
.pi-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;display:inline-block;}
.pi-tempo{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;min-width:130px;text-align:right;}
.pi-sub{font-size:11px;color:var(--ink3);text-align:right;margin-top:2px;}
.btn-del{width:28px;height:28px;border-radius:50%;border:1px solid var(--rule);background:var(--bg);cursor:pointer;color:var(--ink3);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.btn-del:hover{background:var(--danger-bg);color:#8a1a1a;border-color:var(--danger-br);}
.btn-edit{width:28px;height:28px;border-radius:50%;border:1px solid var(--rule);background:var(--bg);cursor:pointer;color:var(--ink3);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.btn-edit:hover{background:var(--accent-lt);color:var(--accent);border-color:var(--accent2);}
.empty-msg{text-align:center;padding:26px;color:var(--ink3);font-size:13px;border:2px dashed var(--rule);border-radius:10px;}
.alertas-lista{margin-bottom:10px;}
.alerta-item{background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:7px;padding:9px 13px;font-size:11.5px;color:var(--warn-tx);margin-bottom:7px;line-height:1.5;}
.resultado-sticky{position:sticky;bottom:0;background:var(--accent);color:#fff;padding:11px 48px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(0,0,0,.28);z-index:100;}
.res-block{display:flex;flex-direction:column;gap:1px;}
.res-lbl{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;}
.res-val{font-family:'Playfair Display',serif;font-size:19px;line-height:1.1;}
.res-val.sm{font-size:13px;line-height:1.3;margin-top:2px;max-width:280px;}
.res-sep{width:1px;height:36px;background:rgba(255,255,255,.15);flex-shrink:0;}
.resultado-panel{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:21px 25px;margin-bottom:16px;}
.rp-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.rp-title::before{content:'';display:block;width:4px;height:19px;background:var(--accent);border-radius:2px;}
.marco-panel{background:var(--accent-lt);border:1px solid #b0c8e0;border-radius:9px;padding:13px 15px;margin-bottom:16px;}
.marco-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:9px;}
.marco-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.marco-item{background:#fff;border:1px solid #c8ddf0;border-radius:7px;padding:9px 11px;}
.marco-item-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);margin-bottom:3px;}
.marco-item-val{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;word-break:break-word;overflow-wrap:break-word;}
.marco-item-sub{font-size:9px;color:var(--ink3);margin-top:2px;}
.regra-row{display:grid;grid-template-columns:210px 1fr 160px;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--rule);}
.regra-row:last-child{border-bottom:none;}
.regra-nome{font-size:12.5px;font-weight:700;}
.regra-desc{font-size:10.5px;color:var(--ink3);margin-top:2px;}
.regra-rec{font-size:9.5px;font-weight:700;color:var(--ok-tx);margin-top:3px;}
.regra-bar-track{background:var(--bg);border-radius:4px;height:8px;overflow:hidden;}
.regra-bar-fill{height:8px;border-radius:4px;transition:width .4s;}
.regra-bar-lbl{display:flex;justify-content:space-between;margin-top:2px;font-size:8.5px;color:var(--ink3);}
.regra-expl{font-size:10px;color:var(--ink3);margin-top:4px;}
.regra-nums{text-align:right;}
.regra-tempo{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;}
.regra-status{font-size:10.5px;margin-top:3px;}
.regra-status.ok{color:var(--ok-tx);font-weight:700;}
.regra-status.falta{color:var(--ink3);}
.regra-proj{font-size:9.5px;color:var(--accent2);margin-top:2px;}
.grupo-sep{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin:16px 0 3px;padding-bottom:4px;border-bottom:1px solid var(--rule);}
.grupo-sep:first-child{margin-top:0;}
.melhor-regra{border-radius:9px;padding:13px 15px;margin-top:16px;}
.detalhe-panel{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:21px 25px;margin-bottom:16px;}
.detalhe-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.detalhe-table th{text-align:left;padding:6px 10px;background:var(--bg);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);font-weight:700;border-bottom:1px solid var(--rule);}
.detalhe-table td{padding:7px 10px;border-bottom:1px solid var(--rule);}
.detalhe-table tr:last-child td{border-bottom:none;}
.detalhe-table tr:hover td{background:var(--bg);}
.td-tipo{font-weight:700;font-size:10.5px;}
.td-num{font-family:'Playfair Display',serif;font-size:12.5px;text-align:right;}
.total-row td{font-weight:700;background:var(--accent-lt)!important;}
.warn-box{background:var(--warn-bg);border:1px solid var(--warn-br);border-radius:8px;padding:11px 14px;font-size:11px;color:var(--warn-tx);line-height:1.6;margin-bottom:13px;}
@media(max-width:760px){
  header,.meta-bar{padding-left:16px;padding-right:16px;}
  .main{padding:12px 12px 170px;}
  .tipo-grupo-btns{gap:6px;}
  .tipo-btn{min-width:110px;}
  .pf-row{grid-template-columns:1fr 1fr;}
  .btn-add{grid-column:1/-1;}
  .regra-row{grid-template-columns:1fr;}
  .marco-grid{grid-template-columns:1fr 1fr;}
  .resultado-sticky{padding:10px 16px;gap:10px;}
}
@media print{
  .resultado-sticky,.btn-hd,.btn-add,.btn-del,.tipos-section,.periodo-form,.no-print{display:none!important;}
  body{background:#fff;}
}
.sys-header{background:#1c1a17;color:#fff;padding:11px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sys-hd-left{display:flex;align-items:center;gap:10px;}
.sys-hd-left img{width:32px;height:32px;border-radius:5px;}
.sys-hd-title{font-size:13px;font-weight:600;}
.sys-hd-sub{font-size:10px;opacity:.5;}
.sys-hd-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.btn-sys{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;padding:6px 12px;font-size:11.5px;cursor:pointer;font-family:inherit;transition:background .13s;white-space:nowrap;}
.btn-sys:hover{background:rgba(255,255,255,.2);}
.btn-sys.verde{background:rgba(26,180,100,.25);border-color:rgba(26,180,100,.5);}
.btn-sys.verde:hover{background:rgba(26,180,100,.4);}
.btn-sys.destaque{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.45);font-weight:600;}
.save-status{font-size:11px;color:rgba(255,255,255,.5);padding:3px 7px;border-radius:5px;white-space:nowrap;}
.save-status.salvando{color:#f0d060;}
.save-status.salvo{color:#60d090;}
.save-status.erro{color:#f08080;}
.calculos-panel{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:13px 15px;margin-bottom:13px;}
.calculos-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:9px;}
.calculos-lista{display:flex;gap:7px;flex-wrap:wrap;}
.calculo-chip{border:1.5px solid var(--rule);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;background:var(--bg);transition:all .12s;font-family:inherit;}
.calculo-chip:hover{border-color:var(--accent2);background:var(--card);}
.calculo-chip.ativo{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);font-weight:600;}
</style>
</head>
